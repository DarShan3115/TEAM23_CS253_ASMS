services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=asms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./server/auth-service
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:password@db:5432/asms_db
      - JWT_SECRET=generate_a_long_random_string_here
      - JWT_REFRESH_SECRET=generate_another_long_random_refresh_string_here
      - NODE_ENV=development
      # ── Email (Nodemailer / Gmail SMTP) ──────────────────────────────────
      # Fill these in to send real emails; leave blank to use console mock
      - SMTP_USER=
      - SMTP_PASS=
      # ── SMS (Twilio) ──────────────────────────────────────────────────────
      # Fill these in to send real SMS OTPs; leave blank to use console mock
      - TWILIO_ACCOUNT_SID=
      - TWILIO_AUTH_TOKEN=
      - TWILIO_PHONE=
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/auth-service:/app
      - /app/node_modules # Anonymous Volume: Boosts I/O speed

  academic-service:
    build: ./server/academic-service
    environment:
      - DB_NAME=asms_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=django-insecure-key
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Optimization: Ensure migrations run safely on every boot
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  productivity-service:
    build: ./server/productivity-service
    environment:
      - PORT=8080
      - GIN_MODE=debug
      - DATABASE_URL=postgres://postgres:password@db:5432/asms_db?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  analytics-service:
    build: ./server/analytics-service
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql://postgres:password@db:5432/asms_db
      - ACADEMIC_SERVICE_URL=http://academic-service:8000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - PYTHONPATH=/app # FIX: Resolves Python Absolute Imports
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    # FIX: Using module flag to ensure context is handled correctly
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8001

  frontend:
    build: ./client
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules # Anonymous Volume
    environment:
      - HOST=0.0.0.0 # Force listening on all interfaces for Docker
    depends_on:
      - auth-service
      - academic-service
      - productivity-service
      - analytics-service

volumes:
  postgres_data: