services:
  # Database
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: asms_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Auth Backend (Squad 1)
  auth-service:
    build: ./server/auth-service
    ports:
      - "5001:5001"
    env_file: ./server/auth-service/.env
    depends_on:
      - db

  # Frontend (Squad 3)
  frontend:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - auth-service