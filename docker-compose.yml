# BuildKit must be enabled for --mount=type=cache in Dockerfiles to work.
# Run with: COMPOSE_DOCKER_CLI_BUILD=1 DOCKER_BUILDKIT=1 docker compose up --build
# Or set these permanently in your shell / .env
services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/postgres/seed_test_data.sql:/docker-entrypoint-initdb.d/02_seed_test_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./server/auth-service
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NODE_ENV=development
      # ── Email (Nodemailer / Gmail SMTP) ──────────────────────────────────
      # Fill these in .env to send real emails; leave blank to use console mock
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # ── SMS (Twilio) ──────────────────────────────────────────────────────
      # Fill these in .env to send real SMS OTPs; leave blank to use console mock
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE=${TWILIO_PHONE}
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/auth-service:/app
      - /app/node_modules # Anonymous Volume: Boosts I/O speed

  academic-service:
    build: ./server/academic-service
    environment:
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Optimization: Ensure migrations run safely on every boot
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  productivity-service:
    build: ./server/productivity-service
    environment:
      - PORT=8080
      - GIN_MODE=debug
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  analytics-service:
    build: ./server/analytics-service
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ACADEMIC_SERVICE_URL=http://academic-service:8000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - JWT_SECRET=${JWT_SECRET}
      - PYTHONPATH=/app # FIX: Resolves Python Absolute Imports
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    # FIX: Using module flag to ensure context is handled correctly
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8001

  frontend:
    build: ./client
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules # Anonymous Volume
    environment:
      - HOST=0.0.0.0 # Force listening on all interfaces for Docker
    depends_on:
      - auth-service
      - academic-service
      - productivity-service
      - analytics-service

volumes:
  postgres_data: